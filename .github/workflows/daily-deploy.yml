name: 每日自动部署

on:
  schedule:
    # 工作日 9:00 CST (UTC+8) = 1:00 UTC
    - cron: '0 1 * * 1-5'
  workflow_dispatch:  # 支持手动触发

jobs:
  deploy:
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 恢复前日涨跌幅缓存
        uses: actions/cache@v4
        with:
          path: cache_prev_change.json
          key: prev-change-cache-${{ github.run_id }}
          restore-keys: |
            prev-change-cache-

      - name: 运行抓取并部署
        shell: pwsh
        run: ./deploy.ps1
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: 保存前日涨跌幅缓存
        uses: actions/cache@v4
        with:
          path: cache_prev_change.json
          key: prev-change-cache-${{ github.run_id }}
