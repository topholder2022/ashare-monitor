name: 每日自动部署

on:
  schedule:
    # 工作日 9:00-11:00 CST (UTC+8)，每30分钟一次保障准时
    - cron: '0 1 * * 1-5'    # 9:00
    - cron: '30 1 * * 1-5'   # 9:30
    - cron: '0 2 * * 1-5'    # 10:00
    - cron: '30 2 * * 1-5'   # 10:30
  workflow_dispatch:  # 支持手动触发

concurrency:
  group: daily-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 恢复前日涨跌幅缓存
        uses: actions/cache@v5
        with:
          path: cache_prev_change.json
          key: prev-change-cache-${{ github.run_id }}
          restore-keys: |
            prev-change-cache-

      - name: 运行抓取并部署
        shell: pwsh
        run: ./deploy.ps1
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: 保存前日涨跌幅缓存
        uses: actions/cache@v5
        with:
          path: cache_prev_change.json
          key: prev-change-cache-${{ github.run_id }}
